app = 'zdrive-neuro-lens'
primary_region = 'cdg'

[build]

[env]
  NMD_USE_MODAL = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
