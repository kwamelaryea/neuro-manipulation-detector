<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0D1117;
        color: #E6EDF3;
      }
      h1 { font-size: 14px; margin: 0 0 12px; }
      label { display: block; font-size: 12px; color: #94A3B8; margin: 10px 0 4px; }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        background: #161B22;
        border: 1px solid #30363D;
        border-radius: 6px;
        color: #E6EDF3;
        font-size: 12px;
      }
      .row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 8px;
        background: #6D28D9;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      #status { font-size: 11px; color: #16A34A; margin-top: 8px; min-height: 14px; }
    </style>
  </head>
  <body>
    <h1>Neuro Manipulation Detector</h1>
    <div class="row">
      <label style="margin:0">Enabled</label>
      <input type="checkbox" id="enabled" />
    </div>
    <label for="backendUrl">Backend URL</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:8000" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
